name: quality-gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: ${{ hashFiles('tests/**/*.ts', 'tests/**/*.tsx') != '' }}
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: E2E
        run: npm run test:e2e

      - name: A11y
        run: npm run test:a11y

      - name: Lighthouse
        run: npm run perf:lighthouse
